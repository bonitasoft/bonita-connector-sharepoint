name: Beta Status
on:
  push:
    paths:
      - 'beta-status.json'
jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check beta status
        run: |
          echo "Beta status updated"
          cat beta-status.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ops = data['operations']
          total = len(ops)
          validated = sum(1 for o in ops.values() if o['status'] == 'validated')
          print(f'Beta progress: {validated}/{total} operations validated')
          "
